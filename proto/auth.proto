    syntax = "proto3";

    package schedula.v1;

    option go_package = "github.com/vector-10/schedula/backend/gen;gen";

    import "google/api/annotations.proto";

    service AuthService {
    rpc Register(RegisterRequest) returns (RegisterResponse) {
        option (google.api.http) = {
        post: "/v1/auth/register"
        body: "*"
        };
    }

    rpc Login(LoginRequest) returns (LoginResponse) {
        option (google.api.http) = {
        post: "/v1/auth/login"
        body: "*"
        };
    }
    }

    message RegisterRequest {
    string email    = 1;
    string password = 2;
    string timezone = 3;
    }

    message RegisterResponse {
    string token   = 1;
    string user_id = 2;
    }

    message LoginRequest {
    string email    = 1;
    string password = 2;
    }

    message LoginResponse {
    string token   = 1;
    string user_id = 2;
    }
