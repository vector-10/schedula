services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schedula
      POSTGRES_PASSWORD: schedula
      POSTGRES_DB: schedula
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedula"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgres://schedula:schedula@postgres:5432/schedula?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
